AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AWS Serverless Amazon Price Tracker Telegram Bot.
  Operates on AWS Lambda, API Gateway, and DynamoDB (fits well within the free tier).

Parameters:
  TelegramBotToken:
    Type: String
    NoEcho: true
    Description: "The Telegram Bot Token, injected from GitHub secrets during deployment."
  ScraperApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: "Optional ScraperAPI key to bypass Amazon CAPTCHAs, injected from GitHub secrets if provided."

Globals:
  Function:
    Timeout: 30
    MemorySize: 128
    Runtime: provided.al2023
    Architectures:
      - arm64
    Environment:
      Variables:
        USERS_TABLE_NAME: !Ref UsersTable
        SUBS_TABLE_NAME: !Ref SubscriptionsTable
        TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
        SCRAPER_API_KEY: !Ref ScraperApiKey
        APP_ENV: "production"

Resources:
  # 1. DynamoDB Table for Users
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PriceTrackerUsers
      AttributeDefinitions:
        - AttributeName: ChatID
          AttributeType: N
      KeySchema:
        - AttributeName: ChatID
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST # Serverless scaling

  # 2. DynamoDB Table for Subscriptions
  SubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PriceTrackerSubscriptions
      AttributeDefinitions:
        - AttributeName: ChatID
          AttributeType: N
        - AttributeName: ASIN
          AttributeType: S
      KeySchema:
        - AttributeName: ChatID
          KeyType: HASH
        - AttributeName: ASIN
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  # 3. API Gateway Webhook Lambda
  BotLambdaFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: bootstrap
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SubscriptionsTable
      Events:
        TelegramWebhook:
          Type: Api
          Properties:
            Path: /webhook
            Method: post

  # 4. Hourly Scraper Cron Lambda
  CronLambdaFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: .
      Handler: bootstrap
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SubscriptionsTable
      Events:
        HourlyTrigger:
          Type: Schedule
          Properties:
            Schedule: 'rate(1 hour)'
            Description: "Triggers the price checker lambda once every hour"
            Enabled: True

Outputs:
  WebhookURL:
    Description: "API Gateway HTTPS URL to set as Telegram Webhook endpoint"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhook"
